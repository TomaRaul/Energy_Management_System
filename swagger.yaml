openapi: 3.0.3
info:
  title: Energy Management System API
  description: |
    REST API for managing users and energy monitoring devices in a smart energy management system.
    
    **Features:**
    - User management (CRUD operations)
    - Device management (CRUD operations)
    - Role-based authentication (Admin/Client)
    - Device-to-user associations
    
    **Authentication:**
    - Login with username/password to receive JWT token
    - Admin role: Full CRUD access to users and devices
    - Client role: Read-only access to assigned devices
    
  version: 1.0.0
  contact:
    name: Raul Toma
    email: raul.toma@student.utcluj.ro
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080
    description: API Gateway (Traefik - port 80)
  - url: http://localhost:8000
    description: API Gateway (Traefik - alternate port)
  - url: http://localhost:8082
    description: User Service (Direct)
  - url: http://localhost:8083
    description: Device Service (Direct)

tags:
  - name: Authentication
    description: Login and authentication endpoints
  - name: Users
    description: User management operations (Admin only)
  - name: Devices
    description: Device management operations

paths:
  # ========================================
  # AUTHENTICATION
  # ========================================
  /auth/login:
    post:
      tags:
        - Authentication
      summary: User login
      description: Authenticate user and receive JWT token with role information
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              admin:
                summary: Admin login
                value:
                  username: admin
                  password: admin123
              client:
                summary: Client login
                value:
                  username: client1
                  password: client123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              examples:
                admin:
                  summary: Admin response
                  value:
                    token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                    role: admin
                    userId: 1
                    username: admin
                client:
                  summary: Client response
                  value:
                    token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                    role: client
                    userId: 100
                    username: client1
        '400':
          description: Bad request - Missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - Invalid username or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ========================================
  # USERS
  # ========================================
  /users:
    get:
      tags:
        - Users
      summary: Get all users
      description: Retrieve a list of all users (Admin only)
      operationId: getUsers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserDTO'
              example:
                - id: 1
                  name: John Doe
                  email: john@example.com
                - id: 2
                  name: Jane Smith
                  email: jane@example.com
        '401':
          description: Unauthorized - Invalid or missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - Admin role required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags:
        - Users
      summary: Create new user
      description: Create a new user (Admin only)
      operationId: createUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserDetailsDTO'
            example:
              name: Alice Johnson
              email: alice@example.com
              username: alice
              password: alice123
              role: client
              age: 28
              address: 123 Main St
      responses:
        '201':
          description: User created successfully
          headers:
            Location:
              description: URI of the created user
              schema:
                type: string
                example: /users/123
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User created successfully
                  id:
                    type: integer
                    example: 123
        '400':
          description: Bad request - Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Admin role required

  /users/{id}:
    get:
      tags:
        - Users
      summary: Get user by ID
      description: Retrieve a specific user by ID (Admin only)
      operationId: getUserById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetailsDTO'
              example:
                id: 1
                name: John Doe
                email: john@example.com
                username: johndoe
                role: client
                age: 30
                address: 456 Oak Ave
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Admin role required
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                status: 404
                error: Not Found

    put:
      tags:
        - Users
      summary: Update user
      description: Update an existing user (Admin only)
      operationId: updateUser
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: User ID to update
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserDetailsDTO'
            example:
              name: John Doe Updated
              email: john.updated@example.com
              username: johndoe
              role: client
              age: 31
              address: 789 New St
      responses:
        '200':
          description: User updated successfully
        '400':
          description: Bad request - Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Admin role required
        '404':
          description: User not found

    delete:
      tags:
        - Users
      summary: Delete user
      description: Delete a user by ID (Admin only)
      operationId: deleteUser
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: User ID to delete
          schema:
            type: integer
            example: 1
      responses:
        '204':
          description: User deleted successfully
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Admin role required
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ========================================
  # DEVICES
  # ========================================
  /devices:
    get:
      tags:
        - Devices
      summary: Get all devices
      description: |
        Retrieve all devices.
        - Admin: Returns all devices
        - Client: Returns only devices assigned to the authenticated user
      operationId: getDevices
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeviceDTO'
              example:
                - id: 1
                  name: Smart Meter - Living Room
                - id: 2
                  name: Smart Meter - Kitchen
        '401':
          description: Unauthorized

    post:
      tags:
        - Devices
      summary: Create new device
      description: Create a new device (Admin only)
      operationId: createDevice
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceDetailsDTO'
            example:
              id: 10
              name: New Smart Meter
              mcv: 750
              userId: 1
      responses:
        '201':
          description: Device created successfully
          headers:
            Location:
              description: URI of the created device
              schema:
                type: string
                example: /devices/10
        '400':
          description: Bad request - Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Admin role required

  /devices/{id}:
    get:
      tags:
        - Devices
      summary: Get device by ID
      description: |
        Retrieve a specific device by ID.
        - Admin: Can view any device
        - Client: Can only view their assigned devices
      operationId: getDeviceById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Device ID
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceDetailsDTO'
              example:
                id: 1
                name: Smart Meter - Living Room
                mcv: 500
                userId: 100
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Not authorized to view this device
        '404':
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      tags:
        - Devices
      summary: Update device
      description: Update an existing device (Admin only)
      operationId: updateDevice
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Device ID to update
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceDetailsDTO'
            example:
              name: Smart Meter - Living Room Updated
              mcv: 600
              userId: 100
      responses:
        '200':
          description: Device updated successfully
        '400':
          description: Bad request - Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Admin role required
        '404':
          description: Device not found

    delete:
      tags:
        - Devices
      summary: Delete device
      description: Delete a device by ID (Admin only)
      operationId: deleteDevice
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Device ID to delete
          schema:
            type: integer
            example: 1
      responses:
        '204':
          description: Device deleted successfully
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Admin role required
        '404':
          description: Device not found

# ========================================
# COMPONENTS
# ========================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /auth/login endpoint

  schemas:
    # Authentication
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: User's username
          example: admin
        password:
          type: string
          format: password
          description: User's password
          example: admin123

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT authentication token
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        role:
          type: string
          enum: [admin, client]
          description: User's role
          example: admin
        userId:
          type: integer
          description: User's ID
          example: 1
        username:
          type: string
          description: User's username
          example: admin

    # Users
    UserDTO:
      type: object
      properties:
        id:
          type: integer
          description: User ID
          example: 1
        name:
          type: string
          description: User's full name
          example: John Doe
        email:
          type: string
          format: email
          description: User's email address
          example: john@example.com

    UserDetailsDTO:
      type: object
      required:
        - name
        - email
        - username
        - role
      properties:
        id:
          type: integer
          description: User ID (auto-generated for POST)
          example: 1
        name:
          type: string
          description: User's full name
          minLength: 1
          example: John Doe
        email:
          type: string
          format: email
          description: User's email address
          example: john@example.com
        username:
          type: string
          description: Username for login
          minLength: 3
          example: johndoe
        password:
          type: string
          format: password
          description: User's password (required for creation)
          minLength: 6
          example: password123
        role:
          type: string
          enum: [admin, client]
          description: User's role
          example: client
        age:
          type: integer
          minimum: 0
          maximum: 150
          description: User's age
          example: 30
        address:
          type: string
          description: User's address
          example: 123 Main Street

    # Devices
    DeviceDTO:
      type: object
      properties:
        id:
          type: integer
          description: Device ID
          example: 1
        name:
          type: string
          description: Device name
          example: Smart Meter - Living Room

    DeviceDetailsDTO:
      type: object
      required:
        - name
      properties:
        id:
          type: integer
          description: Device ID
          example: 1
        name:
          type: string
          description: Device name
          minLength: 1
          example: Smart Meter - Living Room
        mcv:
          type: integer
          minimum: 0
          description: Maximum Consumption Value in Watts
          example: 500
        userId:
          type: integer
          description: ID of the user this device is assigned to (null if unassigned)
          nullable: true
          example: 100

    # Errors
    Error:
      type: object
      properties:
        status:
          type: integer
          description: HTTP status code
          example: 404
        error:
          type: string
          description: Error type
          example: Not Found
        message:
          type: string
          description: Error message

        path:
          type: string
          description: Request path
          example: /users/1
        timestamp:
          type: string
          format: date-time
          description: Error timestamp
          example: 2025-11-04T12:00:00.000Z

    ValidationError:
      type: object
      properties:
        resource:
          type: string
          example: Validation failed
        error:
          type: string
          example: Bad Request
        status:
          type: integer
          example: 400
        message:
          type: string
          example: MethodArgumentNotValidException
        details:
          type: array
          items:
            type: string
          example:
            - "name: name is required"
            - "email: email is required"
        path:
          type: string
          example: uri=/users
        timestamp:
          type: string
          format: date-time
          example: 2025-11-04T12:00:00.000Z
