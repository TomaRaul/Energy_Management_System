services:
  # =========================
  # TRAEFIK - Reverse Proxy
  # =========================
  traefik:
    image: traefik:v3.0
    container_name: traefik-gateway
    command:
      - "--api.insecure=true"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web2.address=:8000"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "8080:8000"
      - "8085:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - user-network
    restart: unless-stopped

  # =========================
  # USER DATABASE
  # =========================
  user-db:
    image: postgres:15
    container_name: user-db
    environment:
      POSTGRES_DB: DS_EMS_USER
      POSTGRES_USER: tomarm
      POSTGRES_PASSWORD: ****
    ports:
      - "5432:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
    networks:
      - user-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U tomarm -d DS_EMS_USER" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # =========================
  # DEVICE DATABASE
  # =========================
  device-db:
    image: postgres:15
    container_name: device-db
    environment:
      POSTGRES_DB: DS_EMS_DEVICE
      POSTGRES_USER: tomarm
      POSTGRES_PASSWORD: ****
    ports:
      - "5433:5432"
    volumes:
      - device-db-data:/var/lib/postgresql/data
    networks:
      - user-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U tomarm -d DS_EMS_DEVICE" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # =========================
  # CREDENTIAL DATABASE
  # =========================
  credential-db:
    image: postgres:15
    container_name: credential-db
    environment:
      POSTGRES_DB: DS_EMS_CREDENTIAL
      POSTGRES_USER: tomarm
      POSTGRES_PASSWORD: ****
    ports:
      - "5434:5432"
    volumes:
      - credential-db-data:/var/lib/postgresql/data
    networks:
      - user-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U tomarm -d DS_EMS_CREDENTIAL" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # =========================
  # USER SERVICE
  # =========================
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-db:5432/DS_EMS_USER
      SPRING_DATASOURCE_USERNAME: tomarm
      SPRING_DATASOURCE_PASSWORD: ****
      PORT: "8082"
    ports:
      - "8082:8082"
    networks:
      - user-network
    depends_on:
      user-db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.user-service-web.rule=PathPrefix(`/users`)"
      - "traefik.http.routers.user-service-web.entrypoints=web"
      - "traefik.http.routers.user-service-web2.rule=PathPrefix(`/users`)"
      - "traefik.http.routers.user-service-web2.entrypoints=web2"
      - "traefik.http.services.user-service.loadbalancer.server.port=8082"
    restart: unless-stopped

  # =========================
  # DEVICE SERVICE
  # =========================
  device-service:
    build:
      context: ./device-service
      dockerfile: Dockerfile
    container_name: device-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://device-db:5432/DS_EMS_DEVICE
      SPRING_DATASOURCE_USERNAME: tomarm
      SPRING_DATASOURCE_PASSWORD: ****
      PORT: "8083"
    ports:
      - "8083:8083"
    networks:
      - user-network
    depends_on:
      device-db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.device-service-web.rule=PathPrefix(`/devices`)"
      - "traefik.http.routers.device-service-web.entrypoints=web"
      - "traefik.http.routers.device-service-web2.rule=PathPrefix(`/devices`)"
      - "traefik.http.routers.device-service-web2.entrypoints=web2"
      - "traefik.http.services.device-service.loadbalancer.server.port=8083"
    restart: unless-stopped

    # =========================
    # AUTH SERVICE
    # =========================
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://credential-db:5432/DS_EMS_CREDENTIAL
      SPRING_DATASOURCE_USERNAME: tomarm
      SPRING_DATASOURCE_PASSWORD: ****
      PORT: "8084"
    ports:
      - "8084:8084"
    networks:
      - user-network
    depends_on:
      credential-db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth-service-web.rule=PathPrefix(`/auth`)"
      - "traefik.http.routers.auth-service-web.entrypoints=web"
      - "traefik.http.routers.auth-service-web2.rule=PathPrefix(`/auth`)"
      - "traefik.http.routers.auth-service-web2.entrypoints=web2"
      - "traefik.http.services.auth-service.loadbalancer.server.port=8084"
    restart: unless-stopped

  # =========================
  # FRONTEND
  # =========================
  frontend:
    build:
      context: ./ems-frontend
      dockerfile: Dockerfile
    container_name: ems-frontend
    ports:
      - "3000:80"
    networks:
      - user-network
    depends_on:
      - traefik
      - user-service
      - device-service
    restart: unless-stopped

  # =========================
  # PGADMIN
  # =========================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - user-network
    restart: unless-stopped

networks:
  user-network:
    driver: bridge

volumes:
  user-db-data:
    driver: local
  device-db-data:
    driver: local
  credential-db-data:
    driver: local
